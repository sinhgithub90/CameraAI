<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Audit - MultiCAMAI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-shell">
  <div class="sidebar">
    <div class="brand"><div class="brand-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 4 5v6c0 5.5 3.8 9.7 8 11 4.2-1.3 8-5.5 8-11V5l-8-3z"/></svg></div><div class="brand-name">MultiCAM<span style="color:var(--blue-600)">AI</span></div></div>
    <nav class="menu">
      <a href="index.html">Tổng quan</a>
      <a href="live.html">Camera trực tiếp</a>
      <a href="alerts.html">Cảnh báo<span class="badge notification-badge js-notification-badge" style="display:none;"></span></a>
      <a href="cammgmt.html">Quản lý camera</a>
      <a href="users.html">Người dùng</a>
      <a href="settings.html">Cài đặt</a>
      <a href="audit.html" class="active">Audit</a>
    </nav>
    <div class="sidebar-foot"><span class="dot-green"></span>Phiên bản v2.3.1</div>
  </div>

  <main class="content">
    <div class="topbar">
      <div>
        <h2>Audit</h2>
        <p style="margin:4px 0 0; color:var(--slate-400); font-size:13px;">Truy vết các thao tác quan trọng trong hệ thống</p>
      </div>
      <div class="topbar-right">
        <div class="icon-btn notification-bell js-notification-bell"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg><span class="badge notification-badge js-notification-badge" style="display:none;"></span></div>
        <div class="user-chip" onclick="toggleUserDropdown()" style="cursor:pointer;"><span id="headerUserName">Admin</span></div>
      </div>
    </div>

    <section class="panel" style="padding:16px;">
      <div style="display:grid; grid-template-columns: repeat(5, minmax(120px, 1fr)); gap:10px; align-items:end;">
        <label style="font-size:12px; color:var(--slate-500);">User<input id="auditUserFilter" class="filter-select" style="width:100%; margin-top:6px;" placeholder="admin"></label>
        <label style="font-size:12px; color:var(--slate-500);">Action<input id="auditActionFilter" class="filter-select" style="width:100%; margin-top:6px;" placeholder="LOGIN"></label>
        <label style="font-size:12px; color:var(--slate-500);">Entity<input id="auditEntityFilter" class="filter-select" style="width:100%; margin-top:6px;" placeholder="CAMERA"></label>
        <label style="font-size:12px; color:var(--slate-500);">Ngày<input id="auditDateFilter" class="filter-select" type="date" style="width:100%; margin-top:6px;"></label>
        <button class="btn-sm primary" onclick="loadAuditLogs(1)">Tìm kiếm</button>
      </div>
      <div id="auditStatus" style="font-size:13px; color:var(--slate-500); margin-top:12px;"></div>
    </section>

    <section style="display:grid; grid-template-columns: minmax(0, 1.4fr) minmax(280px, .8fr); gap:14px; margin-top:14px;">
      <div class="panel" style="padding:0; overflow:hidden;">
        <table class="data-table" style="width:100%;">
          <thead>
            <tr>
              <th>Thời gian</th>
              <th>User</th>
              <th>Action</th>
              <th>Entity</th>
              <th>IP</th>
            </tr>
          </thead>
          <tbody id="auditTableBody"></tbody>
        </table>
      </div>
      <div class="panel" style="padding:16px;">
        <h3 style="margin-top:0; font-size:15px;">Chi tiết</h3>
        <pre id="auditDetailJson" style="white-space:pre-wrap; font-size:12px; line-height:1.45; background:#0f172a; color:#e2e8f0; padding:12px; border-radius:8px; min-height:320px; overflow:auto;">Chọn một dòng audit để xem JSON.</pre>
      </div>
    </section>
  </main>
</div>
<script src="script.js"></script>
</body>
</html>
